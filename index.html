<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Center Builder — Playground</title>
    <style>
      :root {
        --bg: #0f1419; --panel: #1a212b; --panel2: #222c38; --line: #2d3a48;
        --text: #e6edf3; --muted: #8b98a8; --accent: #4ea1ff; --ok: #3fb950;
        --warn: #d29922; --err: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      header { padding: 16px 24px; border-bottom: 1px solid var(--line); }
      header h1 { margin: 0; font-size: 18px; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
      main { display: grid; grid-template-columns: 0.85fr 2fr 1.15fr; gap: 16px; padding: 16px 24px; align-items: start; }
      @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
      .kpis { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
      .kpi { background: var(--panel2); border: 1px solid var(--line); border-radius: 7px; padding: 6px 9px; font-size: 12px; }
      .kpi .k { color: var(--muted); display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
      .kpi .v { font-variant-numeric: tabular-nums; }
      #board svg { display: block; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
      .panel h2 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
      .cat { margin-bottom: 12px; }
      .cat h3 { margin: 0 0 6px; font-size: 12px; color: var(--accent); }
      button.add {
        display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; cursor: pointer; margin: 4px 0;
        background: var(--panel2); border: 1px solid var(--line); color: var(--text);
        border-radius: 7px; padding: 7px 10px;
      }
      button.add:hover { border-color: var(--accent); }
      button.add .ico { width: 36px; height: 24px; flex: 0 0 auto; color: #c7d2de; }
      button.add .nm { flex: 1; }
      button.add small { color: var(--muted); font-variant-numeric: tabular-nums; }
      .row .ico { width: 30px; height: 20px; flex: 0 0 auto; color: #c7d2de; margin-right: 8px; }
      .row .label { display: flex; align-items: center; }
      .unlocked-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
      .unlocked-row .u { display: flex; flex-direction: column; align-items: center; width: 70px; text-align: center; font-size: 11px; color: var(--muted); gap: 4px; }
      .unlocked-row .u .ico { width: 58px; height: 38px; color: var(--text); background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 4px; }
      .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 6px; }
      .row:nth-child(odd) { background: var(--panel2); }
      .row button { background: none; border: none; color: var(--err); cursor: pointer; font-size: 15px; }
      .empty { color: var(--muted); font-style: italic; padding: 6px; }
      select { width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 7px; padding: 8px; }
      .metric { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--line); }
      .metric span:last-child { font-variant-numeric: tabular-nums; }
      .sub { color: var(--muted); font-size: 12px; }
      .viol { padding: 7px 10px; border-radius: 7px; margin: 5px 0; font-size: 13px; }
      .viol.error { background: rgba(248,81,73,.12); border: 1px solid var(--err); }
      .viol.warning { background: rgba(210,153,34,.12); border: 1px solid var(--warn); }
      .result { padding: 12px; border-radius: 9px; margin-bottom: 12px; font-size: 15px; font-weight: 600; }
      .result.pass { background: rgba(63,185,80,.14); border: 1px solid var(--ok); }
      .result.fail { background: rgba(248,81,73,.14); border: 1px solid var(--err); }
      .result .sub { font-weight: 400; }
      code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; }
      button.mode { background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 6px 14px; cursor: pointer; margin-right: 6px; }
      button.mode.active { background: var(--accent); border-color: var(--accent); color: #04121f; font-weight: 600; }
      .lesson { background: var(--panel2); border: 1px solid var(--line); border-radius: 9px; padding: 12px; }
      .lesson .kind { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--accent); }
      .lesson h3 { margin: 4px 0 8px; font-size: 16px; }
      .lesson .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .lesson button { background: var(--accent); border: none; color: #04121f; font-weight: 600; border-radius: 7px; padding: 8px 14px; cursor: pointer; }
      .lesson button:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
      .lesson button.ghost { background: none; border: 1px solid var(--line); color: var(--text); font-weight: 400; }
      .hint { margin-top: 10px; color: var(--warn); font-size: 13px; }
      .quiz button { display:block; width:100%; text-align:left; background: var(--panel); border:1px solid var(--line); color: var(--text); font-weight: 400; margin: 4px 0; }
      .done { color: var(--ok); font-weight: 600; margin-top: 8px; }
      .coursebar { height: 6px; background: var(--panel2); border-radius: 4px; margin-top: 8px; max-width: 320px; overflow: hidden; }
      .coursebar .fill { height: 100%; background: var(--ok); width: 0%; transition: width .2s; }
      .crumb { font-size: 12px; color: var(--muted); }
      .step { font-size: 12px; color: var(--accent); margin-top: 2px; }
      .bar { height: 5px; background: var(--panel); border: 1px solid var(--line); border-radius: 4px; margin: 6px 0 10px; overflow: hidden; }
      .bar .fill { height: 100%; background: var(--accent); }
      #right-panel { display: flex; flex-direction: column; min-height: calc(100vh - 150px); }
      #lesson { display: flex; flex-direction: column; flex: 1; min-height: 0; }
      .lesson-head { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
      .lesson-head select { width: 100%; }
      .lesson-head .coursebar { max-width: none; margin-top: 0; }
      .lesson-body { flex: 1; overflow-y: auto; min-height: 0; }
      .navfoot { display: flex; align-items: center; margin-top: auto; gap: 8px; border-top: 1px solid var(--line); padding-top: 12px; }
      .navfoot button { background: var(--accent); border: none; color: #04121f; font-weight: 600; border-radius: 7px; padding: 8px 14px; cursor: pointer; }
      .navfoot button.ghost { background: none; border: 1px solid var(--line); color: var(--text); font-weight: 400; }
      .navfoot button:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
      .board-panel { margin: 0 24px 24px; }
      #board { overflow-x: auto; }
      .board-legend { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-top: 8px; flex-wrap: wrap; }
      .board-legend span::before { content: ""; display: inline-block; width: 14px; height: 3px; vertical-align: middle; margin-right: 5px; }
      .legend-power::before { background: #f2c744; } .legend-net::before { background: #4ea1ff; } .legend-heat::before { background: #f85149; }
      .shelf-row { display: flex; gap: 6px; align-items: stretch; }
      .shelf-row .add { flex: 1; }
      button.info { background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 50%; width: 24px; height: 24px; flex: 0 0 auto; cursor: pointer; font-size: 12px; line-height: 1; padding: 0; align-self: center; }
      button.info:hover { border-color: var(--accent); color: var(--accent); }
      #detail-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; z-index: 10; }
      #detail-backdrop.open { display: block; }
      #detail-panel { position: fixed; top: 0; right: 0; height: 100%; width: 340px; max-width: 90vw; background: var(--panel); border-left: 1px solid var(--line); padding: 20px; overflow-y: auto; transform: translateX(100%); transition: transform .2s; z-index: 11; }
      #detail-panel.open { transform: translateX(0); }
      #detail-panel .big { width: 120px; height: 80px; color: var(--text); background: var(--panel2); border: 1px solid var(--line); border-radius: 9px; padding: 8px; }
      #detail-panel h3 { margin: 12px 0 2px; }
      #detail-panel .vendor { color: var(--muted); font-size: 13px; }
      #detail-panel table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
      #detail-panel td { border-bottom: 1px solid var(--line); padding: 5px 0; }
      #detail-panel td:last-child { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
      #detail-panel a.learn { display: inline-block; margin-top: 14px; color: var(--accent); }
      #detail-panel .close { float: right; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
      .auth { float: right; display: flex; gap: 8px; align-items: center; }
      .auth .who { color: var(--muted); font-size: 13px; }
      #account { margin-top: 4px; }
      #save-build { color: #04121f; background: var(--accent); border: none; font-weight: 600; margin: 8px 0; justify-content: center; }
      .mybuild { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 6px; gap: 6px; }
      .mybuild:nth-child(even) { background: var(--panel2); }
      .mybuild .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .mybuild .acts { flex: 0 0 auto; }
      .mybuild .acts button { background: none; border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 3px 7px; margin-left: 4px; cursor: pointer; font-size: 12px; }
      .mybuild .acts button:hover { border-color: var(--accent); }
      .share-banner { background: rgba(78,161,255,.12); border: 1px solid var(--accent); border-radius: 9px; padding: 10px 14px; margin: 0 24px 12px; }
      .share-banner button { background: var(--accent); border: none; color: #04121f; font-weight: 600; border-radius: 7px; padding: 6px 12px; cursor: pointer; margin-left: 8px; }
      .share-banner button.ghost { background: none; border: 1px solid var(--line); color: var(--text); font-weight: 400; }
    </style>
  </head>
  <body>
    <header>
      <div id="auth" class="auth"></div>
      <h1>Data Center Builder — Playground</h1>
      <p>Add parts on the left, pick a goal in the middle, and watch what your data center can actually do. Power is auto-wired for you in this early demo.</p>
      <div style="margin-top:10px">
        <button id="mode-learn" class="mode">Learn</button>
        <button id="mode-sandbox" class="mode">Sandbox</button>
      </div>
    </header>
    <div id="share-banner" class="share-banner" style="display:none"></div>
    <main>
      <section class="panel">
        <h2>Parts shelf</h2>
        <div id="shelf"></div>
        <h2 style="margin-top:16px">Your build</h2>
        <div id="build"></div>
        <div id="account"></div>
      </section>
      <section class="panel">
        <h2>Infrastructure</h2>
        <div id="board"></div>
        <div id="result" style="margin-top:12px"></div>
        <div id="metrics" class="kpis"></div>
        <div id="violations"></div>
        <p id="disclaimer" class="sub" style="margin-top:14px"></p>
      </section>
      <section class="panel" id="right-panel">
        <div id="scenario-wrap">
          <h2>Goal</h2>
          <select id="scenario"></select>
        </div>
        <div id="lesson" class="lesson"></div>
      </section>
    </main>
    <div id="detail-backdrop"></div>
    <aside id="detail-panel" aria-hidden="true"></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
