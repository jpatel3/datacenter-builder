<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Center Builder — Playground</title>
    <style>
      :root {
        --bg: #0f1419; --panel: #1a212b; --panel2: #222c38; --line: #2d3a48;
        --text: #e6edf3; --muted: #8b98a8; --accent: #4ea1ff; --ok: #3fb950;
        --warn: #d29922; --err: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      header { padding: 16px 24px; border-bottom: 1px solid var(--line); }
      header h1 { margin: 0; font-size: 18px; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
      main { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 16px; padding: 16px 24px; align-items: start; }
      @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
      .panel h2 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
      .cat { margin-bottom: 12px; }
      .cat h3 { margin: 0 0 6px; font-size: 12px; color: var(--accent); }
      button.add {
        display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; cursor: pointer; margin: 4px 0;
        background: var(--panel2); border: 1px solid var(--line); color: var(--text);
        border-radius: 7px; padding: 7px 10px;
      }
      button.add:hover { border-color: var(--accent); }
      button.add .ico { width: 36px; height: 24px; flex: 0 0 auto; color: #c7d2de; }
      button.add .nm { flex: 1; }
      button.add small { color: var(--muted); font-variant-numeric: tabular-nums; }
      .row .ico { width: 30px; height: 20px; flex: 0 0 auto; color: #c7d2de; margin-right: 8px; }
      .row .label { display: flex; align-items: center; }
      .unlocked-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
      .unlocked-row .u { display: flex; flex-direction: column; align-items: center; width: 70px; text-align: center; font-size: 11px; color: var(--muted); gap: 4px; }
      .unlocked-row .u .ico { width: 58px; height: 38px; color: var(--text); background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 4px; }
      .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 6px; }
      .row:nth-child(odd) { background: var(--panel2); }
      .row button { background: none; border: none; color: var(--err); cursor: pointer; font-size: 15px; }
      .empty { color: var(--muted); font-style: italic; padding: 6px; }
      select { width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 7px; padding: 8px; }
      .metric { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--line); }
      .metric span:last-child { font-variant-numeric: tabular-nums; }
      .sub { color: var(--muted); font-size: 12px; }
      .viol { padding: 7px 10px; border-radius: 7px; margin: 5px 0; font-size: 13px; }
      .viol.error { background: rgba(248,81,73,.12); border: 1px solid var(--err); }
      .viol.warning { background: rgba(210,153,34,.12); border: 1px solid var(--warn); }
      .result { padding: 12px; border-radius: 9px; margin-bottom: 12px; font-size: 15px; font-weight: 600; }
      .result.pass { background: rgba(63,185,80,.14); border: 1px solid var(--ok); }
      .result.fail { background: rgba(248,81,73,.14); border: 1px solid var(--err); }
      .result .sub { font-weight: 400; }
      code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; }
      button.mode { background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 6px 14px; cursor: pointer; margin-right: 6px; }
      button.mode.active { background: var(--accent); border-color: var(--accent); color: #04121f; font-weight: 600; }
      .lesson { background: var(--panel2); border: 1px solid var(--line); border-radius: 9px; padding: 12px; }
      .lesson .kind { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--accent); }
      .lesson h3 { margin: 4px 0 8px; font-size: 16px; }
      .lesson .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .lesson button { background: var(--accent); border: none; color: #04121f; font-weight: 600; border-radius: 7px; padding: 8px 14px; cursor: pointer; }
      .lesson button:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
      .lesson button.ghost { background: none; border: 1px solid var(--line); color: var(--text); font-weight: 400; }
      .hint { margin-top: 10px; color: var(--warn); font-size: 13px; }
      .quiz button { display:block; width:100%; text-align:left; background: var(--panel); border:1px solid var(--line); color: var(--text); font-weight: 400; margin: 4px 0; }
      .done { color: var(--ok); font-weight: 600; }
    </style>
  </head>
  <body>
    <header>
      <h1>Data Center Builder — Playground</h1>
      <p>Add parts on the left, pick a goal in the middle, and watch what your data center can actually do. Power is auto-wired for you in this early demo.</p>
      <div style="margin-top:10px">
        <button id="mode-learn" class="mode">Learn</button>
        <button id="mode-sandbox" class="mode">Sandbox</button>
        <span id="progress" class="sub" style="margin-left:10px"></span>
      </div>
    </header>
    <main>
      <section class="panel"><h2>Parts shelf</h2><div id="shelf"></div></section>
      <section class="panel">
        <h2>Your build</h2>
        <div id="build"></div>
        <div id="scenario-wrap" style="margin-top:14px">
          <h2>Goal</h2>
          <select id="scenario"></select>
        </div>
        <div id="lesson" class="lesson" style="margin-top:14px"></div>
      </section>
      <section class="panel">
        <h2>Readout</h2>
        <div id="result"></div>
        <div id="metrics"></div>
        <div id="violations" style="margin-top:12px"></div>
        <p id="disclaimer" class="sub" style="margin-top:14px"></p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
